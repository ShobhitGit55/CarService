    const API_URL = "https://script.google.com/macros/s/AKfycbygCcBz8_YO81qqargCZYLnqUVZWbGAIr7S-1g6v8ue2-BChURso-jEraBtyWEOgw0l/exec";
    let allData = [];
    let currentPage = 1;
    const rowsPerPage = 5; // change this as needed
    let totalCount = 0;
    const today = new Date();

    function loadData() {
       // const overlay = document.getElementById("overlay");
        const tblAppointments = document.getElementById("tblAppointments");
        const pagination = document.getElementById("pagination");

      // overlay.style.display = "none";       // show loading
        tblAppointments.style.display = "inline-grid-lanes"; // hide table
        pagination.style.display = "none";     // hide pagination


        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                allData = data;           // store all appointments
                totalCount = data.length;
                currentPage = 1;          // reset to first page
                displayTable();           // display first page
                tblAppointments.style.display = "inline-grid-lanes"; // show table
                pagination.style.display = "flex";    // show pagination
                document.getElementById("totalApponintment").innerText = totalCount;
                // document.getElementById("allAppointment").innerText = totalCount;


                chart(data);
               CardsData(data)
                updateDashboard(data)
            })
            .catch(err => console.error("Load Error:", err))
           // .finally(() => overlay.style.display = "none"); // hide loading
    }

    function chart(data) {
        const serviceCount = {};


        data.forEach(row => {
            const service = row.Service;

            if (!serviceCount[service]) {
                serviceCount[service] = 0;
            }

            serviceCount[service]++;
        });
        const labels = Object.keys(serviceCount);
        const values = Object.values(serviceCount);
        const maxValue = Math.max(...values);
        const ctx = document.getElementById('sheetChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar', // change to 'pie' if you want
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Bookings',
                    data: values,
                    backgroundColor: [
                        '#667eea',
                        '#f6ad55',
                        '#48bb78',
                        '#ed64a6',
                        '#38b2ac',
                        '#9f7aea'
                    ],
                    borderRadius: 6,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: "nearest",
                    intersect: false
                },
                plugins: {
                    legend: {
                        display: false   // 🔥 hide right side label
                    }
                    //position: window.innerWidth < 768 ? "bottom" : "right"
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        min: 0,
                        max: maxValue,
                        grace: 0,
                        ticks: {
                            stepSize: 1,
                            autoSkip: false,
                            precision: 0
                        }
                    }
                }
            }
        });
    }

    // Display table for current page
    function displayTable() {

        allData.sort((a, b) => {
            const timeA = new Date(`1970-01-01T${(a.Time || "").trim()}:00`);
            const timeB = new Date(`1970-01-01T${(b.Time || "").trim()}:00`);
            return timeA - timeB;
        });


        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = allData.slice(start, end);

        let bookedTimes = allData.map(item => item.Time); // get all booked times


        let table = "";
        pageData.forEach(item => {
            const mobile = item.Mobile ? "91" + item.Mobile : "";
            const message = `Hi ${item.Name}, your appointment for ${item.Service} is scheduled at ${item.Time}. Thank you!`;
            const encodedMessage = encodeURIComponent(message);

            table += `<tr>
                  <td>${item.Name}</td>
                  <td>${item.Service}</td>
                  <td>${item.Time}</td>
                   <td>
                ${mobile ? `
                <a href="https://wa.me/${mobile}?text=${encodedMessage}"
                   target="_blank"
                   style="text-decoration:none;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
                         alt="WhatsApp"
                         style="width:24px; height:24px; cursor:pointer;">
                </a>
                ` : 'No Number'}
            </td>
                </tr>`;
        });

        document.getElementById("tableBody").innerHTML = table;

        renderPagination();
    }

    // Call loadData after DOM is ready
    document.addEventListener("DOMContentLoaded", loadData);

    function renderPagination() {
        const totalPages = Math.ceil(allData.length / rowsPerPage);
        const pagination = document.getElementById("pagination");

        pagination.innerHTML = "";

        if (totalPages <= 1) return;

        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, currentPage + 2);

        // Always show first page
        if (start > 1) {
            createButton(1);
            if (start > 2) addDots();
        }

        for (let i = start; i <= end; i++) {
            createButton(i);
        }

        // Always show last page
        if (end < totalPages) {
            if (end < totalPages - 1) addDots();
            createButton(totalPages);
        }

        function createButton(page) {
            const li = document.createElement("li");
            li.className = "page-item " + (page === currentPage ? "active" : "");

            const btn = document.createElement("button");
            btn.className = "page-link";
            btn.innerText = page;

            btn.addEventListener("click", function () {
                currentPage = page;
                displayTable();
                renderPagination();
            });

            li.appendChild(btn);
            pagination.appendChild(li);
        }

        function addDots() {
            const li = document.createElement("li");
            li.className = "page-item disabled";

            const span = document.createElement("span");
            span.className = "page-link";
            span.innerText = "...";

            li.appendChild(span);
            pagination.appendChild(li);
        }
    }

    function CardsData(data) {
        debugger;
        const formattedToday =
            String(today.getDate()).padStart(2, '0') + "-" +
            String(today.getMonth() + 1).padStart(2, '0') + "-" +
            today.getFullYear();

        // 🔹 Filter Today's Appointments
        const todayAppointments = data.filter(item => {
            if (!item.DateTime) return false;

            const appointmentDate = item.DateTime.split(" ")[0]; // remove time
            return appointmentDate === formattedToday;
        });

        document.getElementById("todayCount").innerText = todayAppointments.length;
        debugger;
        //last time
        if (!todayAppointments.length) {
            document.getElementById("lastCountTime").innerText = "No bookings today";
            return false;
        }


        const latestTime = data.reduce((latest, item) => {
            return item.Time > latest ? item.Time : latest;
        }, "00:00");

        document.getElementById("lastCountTime").innerText = latestTime;

    }


    function updateDashboard(bookings) {
        //console.log(bookings);
        let totalRevenue = 0;
        let serviceCount = {};
        let serviceRevenue = {};

        

        bookings.forEach(item => {

            // let serviceName = item.Service?.trim();
            let serviceName = item.Service ? item.Service.trim() : null;

            if (!serviceName || !servicePrices[serviceName]) return;
            if (!serviceName) return;   // 🔥 SKIP EMPTY ROWS

            let price = servicePrices[serviceName] || 0;

            totalRevenue += price;

            serviceCount[serviceName] = (serviceCount[serviceName] || 0) + 1;
            serviceRevenue[serviceName] = (serviceRevenue[serviceName] || 0) + price;
        });


        // Revenue Card
        document.getElementById("totalRevenue").innerText = "₹" + totalRevenue;

        // Most Booked
        if (Object.keys(serviceCount).length > 0) {
            let mostBooked = Object.keys(serviceCount)
                .reduce((a, b) => serviceCount[a] > serviceCount[b] ? a : b);

            document.getElementById("mostBooked").innerText =
                mostBooked + " (" + serviceCount[mostBooked] + ")";
        }

        // Highest Revenue Service
        if (Object.keys(serviceRevenue).length > 0) {
            let highestRevenueService = Object.keys(serviceRevenue)
                .reduce((a, b) => serviceRevenue[a] > serviceRevenue[b] ? a : b);

            document.getElementById("highestRevenueService").innerText =
                highestRevenueService + " (₹" + serviceRevenue[highestRevenueService] + ")";
        }

        // Average
        let avgValue = bookings.length > 0 ? totalRevenue / bookings.length : 0;
        document.getElementById("avgBookingValue").innerText =
            "₹" + avgValue.toFixed(0);

        // 🔥 Update Pie Chart
        updatePieChart(serviceRevenue);
    }

    function updatePieChart(serviceRevenue) {

        const labels = Object.keys(serviceRevenue);
        console.log(Object.keys(serviceRevenue));
        const data = Object.values(serviceRevenue);
        // console.log(data)
        const ctx = document.getElementById("revenuePieChart");

        // Destroy old chart if exists
        if (pieChart) {
            pieChart.destroy();
        }

        pieChart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: labels,   // 🔥 YOU REMOVED THIS (needed)
                datasets: [{
                    label: "Total Revenue (₹)",
                    data: data,
                    backgroundColor: [
                        "#2a5298",
                        "#1e3c72",
                        "#4CAF50",
                        "#FF9800",
                        "#9C27B0"
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,  // 🔥 Important for mobile

                interaction: {
                    mode: "nearest",
                    intersect: false
                },

                plugins: {
                    legend: {
                        display: false   // hide legend
                    }
                }
            }
        });
    }

    const servicePrices = {
        "Car Clean": 499,
        "Washing": 299,
        "Polishing": 999,
        "Smoothing": 799,
        "InteriorCleaning": 699
    };
