<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #a5665d;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

            button:hover {
                background: #a5665d;
            }

        .table-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: #a5665d;
            color: white;
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 1.3rem;
            }

            input, select, button {
                font-size: 0.95rem;
                padding: 10px;
            }

            table {
                font-size: 0.85rem;
            }
        }




        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .total-record {
            font-size: 14px;
            color: #555;
            margin: 0;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .pagination button {
                padding: 5px 10px;
                font-size: 13px;
                border: 1px solid #ccc;
                background: #e0e0e0; /* grey for inactive */
                color: #333;
                cursor: pointer;
                border-radius: 4px;
                transition: all 0.2s;
            }

                .pagination button:hover {
                    background: #d5d5d5; /* slightly darker grey on hover */
                }

                .pagination button.active {
                    background: #a0522d !important; /* brown */
                    color: white !important;
                    border-color: #a0522d !important;
                    font-weight: bold;
                }






        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5); /* semi-transparent */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* above everything */
        }

        /* Spinner container */
        .spinner-container {
            text-align: center;
            color: #fff;
        }

        /* Spinner animation */
        .spinner {
            border: 8px solid rgba(213 59 59 / 30%); /* Light border */
            border-top: 8px solid #fff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            margin: 0 auto 15px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 1.2em;
            font-weight: bold;
        }

        .chart-panel {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .panel-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        canvas {
            width: 40% !important;
            height: 200px !important;
        }


        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .panel-header h2 {
                margin: 0;
                font-size: 20px;
            }

        .btn-link {
            padding: 8px 14px;
            background: #a5665d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

            .btn-link:hover {
                background: #a5665d;
            }

        .dashboard-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

            .card h3 {
                font-size: 16px;
                margin-bottom: 10px;
                color: #555;
            }

            .card p {
                font-size: 26px;
                font-weight: bold;
                color: #a0522d; /* brown theme */
            }


        .chart-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            flex: 1;
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

            /* Make charts responsive */
            .chart-box canvas {
                width: 100% !important;
                height: 350px !important;
            }


        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            background: linear-gradient(135deg, #a0522d, #d2b48c);
            color: white;
            border-radius: 12px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px; /* space between salon name and icon */
        }

        .brand-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap; /* prevents line break */
        }

        .refresh-btn {
            width: 38px; /* fixed square size */
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #a0522d;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

            .refresh-btn:hover {
                background: #f3f3f3;
            }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>
    <div class="container">
        <div id="overlay">
            <div class="spinner-container" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Please wait dashbaord loading...</div>
            </div>
        </div>

        <div class="dashboard-header">
            <div class="header-left">
                <h1>Car Clean  Dashboard</h1>
            </div>

            <div class="header-right">
                <div class="brand-name">ABC Car Detailing</div>

                <button class="refresh-btn" onclick="location.reload()">
                    🔄
                </button>
            </div>
        </div>

        <div class="dashboard-cards">

            <div class="card">
                <h3>All Appointment</h3>
                <p id="allAppointment">0</p>
            </div>

            <div class="card">
                <h3>Total Appointment Today</h3>
                <p id="todayCount">0</p>
            </div>

            <div class="card">
                <h3> Last Appointment Time</h3>
                <p id="lastCountTime">No bookings today</p>
            </div>


        </div>

        <div class="chart-panel">
            <div class="panel-header">
                <h2>All Appointments</h2>
                <a href="CarClean.html" class="btn-link">Book</a>
            </div>

            <table id="tableContainer" class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Service</th>
                        <th>Time</th>
                        <th>Chat</th>

                    </tr>
                </thead>
                <tbody id="tableBody" class="table">
                </tbody>

            </table>

            <!--<a href="https://wa.me/91?text=Hi%20Sir%2CMadam.%0AWe%E2%80%99ve%20developed%20an%20easy-to-use%20Salon%20Management%20Software%20to%20automate%20appointments%2C%20save%20time%2C%20and%20boost%20monthly%20income.%20Let%20me%20know%20if%20you%E2%80%99d%20like%20a%20quick%20demo." target="_blank">
                WhatsApp
            </a>-->

            <div class="top-bar">
                <p class="total-record">
                    Total Records: <strong id="totalApponintment">0</strong>
                </p>
                <div id="pagination" class="pagination"></div>

            </div>


        </div>
        <div class="chart-panel">
            <div class="panel-header">
                Graphs
            </div>

            <div class="chart-row">
                <div class="chart-box">
                    <canvas id="sheetChart"></canvas>
                </div>

                <div class="chart-box">
                    <canvas id="sheetChartPie"></canvas>
                </div>
            </div>
        </div>




    </div>

    <script>

        const API_URL = "https://script.google.com/macros/s/AKfycbygCcBz8_YO81qqargCZYLnqUVZWbGAIr7S-1g6v8ue2-BChURso-jEraBtyWEOgw0l/exec";
        let allData = [];
        let currentPage = 1;
        const rowsPerPage = 5; // change this as needed
        let totalCount = 0;
        const today = new Date();

        function loadData() {
            const overlay = document.getElementById("overlay");
            const tableContainer = document.getElementById("tableContainer");
            const pagination = document.getElementById("pagination");

            overlay.style.display = "flex";       // show loading
            tableContainer.style.display = "inline-grid-lanes"; // hide table
            pagination.style.display = "none";     // hide pagination


            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    allData = data;           // store all appointments
                    totalCount = data.length;
                    currentPage = 1;          // reset to first page
                    displayTable();           // display first page
                    tableContainer.style.display = "inline-grid-lanes"; // show table
                    pagination.style.display = "flex";    // show pagination
                    document.getElementById("totalApponintment").innerText = totalCount;
                    document.getElementById("allAppointment").innerText = totalCount;


                    chart(data);
                    chartPie(data)
                    CardsData(data)

                })
                .catch(err => console.error("Load Error:", err))
                .finally(() => overlay.style.display = "none"); // hide loading
        }

        function chart(data) {
            const serviceCount = {};

            data.forEach(row => {
                const service = row.Service;

                if (!serviceCount[service]) {
                    serviceCount[service] = 0;
                }

                serviceCount[service]++;
            });
            const labels = Object.keys(serviceCount);
            const values = Object.values(serviceCount);
            const maxValue = Math.max(...values);
            const ctx = document.getElementById('sheetChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar', // change to 'pie' if you want
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Bookings',
                        data: values,
                        backgroundColor: [
                            '#667eea',
                            '#f6ad55',
                            '#48bb78',
                            '#ed64a6',
                            '#38b2ac',
                            '#9f7aea'
                        ],
                        borderRadius: 6,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            min: 0,
                            max: maxValue,
                            grace: 0,
                            ticks: {
                                stepSize: 1,
                                autoSkip: false,
                                precision: 0
                            }
                        }
                    }
                }
            });
        }

        function chartPie(data) {
            const serviceCount = {};

            data.forEach(row => {
                const service = row.Service;

                if (!serviceCount[service]) {
                    serviceCount[service] = 0;
                }

                serviceCount[service]++;
            });
            const labels = Object.keys(serviceCount);
            const values = Object.values(serviceCount);
            const maxValue = Math.max(...values);
            const ctx = document.getElementById('sheetChartPie').getContext('2d');
            new Chart(ctx, {
                type: 'pie', // change to 'pie' if you want
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Bookings',
                        data: values,
                        backgroundColor: [
                            '#667eea',
                            '#f6ad55',
                            '#48bb78',
                            '#ed64a6',
                            '#38b2ac',
                            '#9f7aea'
                        ],
                        borderRadius: 6,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            min: 0,
                            max: maxValue,
                            grace: 0,
                            ticks: {
                                stepSize: 1,
                                autoSkip: false,
                                precision: 0
                            }
                        }
                    }
                }
            });
        }


        // Display table for current page
        function displayTable() {

            allData.sort((a, b) => {
                const timeA = new Date(`1970-01-01T${(a.Time || "").trim()}:00`);
                const timeB = new Date(`1970-01-01T${(b.Time || "").trim()}:00`);
                return timeA - timeB;
            });


            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = allData.slice(start, end);

            let bookedTimes = allData.map(item => item.Time); // get all booked times
           

            let table = "";
            pageData.forEach(item => {
                const mobile = item.Mobile ? "91" + item.Mobile : "";
                const message = `Hi ${item.Name}, your appointment for ${item.Service} is scheduled at ${item.Time}. Thank you!`;
                const encodedMessage = encodeURIComponent(message);

                table += `<tr>
              <td>${item.Name}</td>
              <td>${item.Service}</td>
              <td>${item.Time}</td>
               <td>
            ${mobile ? `
            <a href="https://wa.me/${mobile}?text=${encodedMessage}" 
               target="_blank" 
               style="text-decoration:none;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
                     alt="WhatsApp" 
                     style="width:24px; height:24px; cursor:pointer;">
            </a>
            ` : 'No Number'}
        </td>
            </tr>`;
            });

            document.getElementById("tableBody").innerHTML = table;
           
            renderPagination();
        }

        // Call loadData after DOM is ready
        document.addEventListener("DOMContentLoaded", loadData);

        function renderPagination() {
            const totalPages = Math.ceil(allData.length / rowsPerPage);
            const pagination = document.getElementById("pagination");

            pagination.innerHTML = "";

            if (totalPages <= 1) return;

            const maxVisible = 5; // how many center buttons to show
            let start = Math.max(1, currentPage - 2);
            let end = Math.min(totalPages, currentPage + 2);

            // Always show first page
            if (start > 1) {
                createButton(1);
                if (start > 2) addDots();
            }

            for (let i = start; i <= end; i++) {
                createButton(i);
            }

            // Always show last page
            if (end < totalPages) {
                if (end < totalPages - 1) addDots();
                createButton(totalPages);
            }

            function createButton(page) {
                const btn = document.createElement("button");
                btn.innerText = page;

                if (page === currentPage) {
                    btn.classList.add("active");
                }

                btn.addEventListener("click", function () {
                    currentPage = page;
                    displayTable();
                    renderPagination();
                });

                pagination.appendChild(btn);
            }

            function addDots() {
                const span = document.createElement("span");
                span.innerText = "...";
                span.style.padding = "5px";
                pagination.appendChild(span);
            }
        }

        function CardsData(data)
        {
            debugger;
            const formattedToday =
                String(today.getDate()).padStart(2, '0') + "-" +
                String(today.getMonth() + 1).padStart(2, '0') + "-" +
                today.getFullYear();

            // 🔹 Filter Today's Appointments
            const todayAppointments = data.filter(item => {
                if (!item.DateTime) return false;

                const appointmentDate = item.DateTime.split(" ")[0]; // remove time
                return appointmentDate === formattedToday;
            });

            document.getElementById("todayCount").innerText = todayAppointments.length;
            debugger;
            //last time
            if (!todayAppointments.length) {
                document.getElementById("lastCountTime").innerText = "No bookings today";
                return false;
            }

            // 🔹 Convert to Date objects
            //const parsedDates = todayAppointments.map(item => {
            //    const [datePart, timePart] = item.DateTime.split(" ");
            //    const [day, month, year] = datePart.split("-");
            //    return new Date(`${year}-${month}-${day}T${timePart}`);
            //});

            // 🔹 Get latest time
           // const latestDate = new Date(Math.max(...parsedDates));

            // 🔹 Show only time
            //document.getElementById("lastCountTime").innerText =
            //    latestDate.toLocaleTimeString();

            const latestTime = data.reduce((latest, item) => {
                return item.Time > latest ? item.Time : latest;
            }, "00:00");

            document.getElementById("lastCountTime").innerText = latestTime;

        }

    </script>


</body>
</html>
